# ── meesho.techseventeen.com — Landing Page ───────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name meesho.techseventeen.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name meesho.techseventeen.com;

    # ── SSL (Let's Encrypt / Certbot will fill these in) ──────────────────────
    ssl_certificate     /etc/letsencrypt/live/meesho.techseventeen.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/meesho.techseventeen.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/meesho-landing;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}


# ── scanserver.techseventeen.com — Node.js Backend ────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name scanserver.techseventeen.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name scanserver.techseventeen.com;

    ssl_certificate     /etc/letsencrypt/live/scanserver.techseventeen.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/scanserver.techseventeen.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy all requests to the Node.js server
    location / {
        proxy_pass         http://127.0.0.1:3847;
        proxy_http_version 1.1;

        # Required for WebSocket upgrade
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket keep-alive
        proxy_read_timeout  86400;
        proxy_send_timeout  86400;
    }

    # Larger body limit for video uploads (25 MB + headroom)
    client_max_body_size 30M;

    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}
